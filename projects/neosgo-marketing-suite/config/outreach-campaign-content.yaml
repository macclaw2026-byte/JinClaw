  main_message_body: |
    Hi,

    Hope this email finds you well.
    Quick question — are you currently sourcing products for your projects yourself, or working with suppliers?

    We’re building NeosGo, a platform that helps interior designers turn sourcing into a revenue stream.

    Through our Professional Buyer program, designers can:
    - Source products directly through us
    - Add their own margin or earn commission on projects
    - Let us handle inventory, warehousing, and delivery

    We already stock products in the U.S., so lead times are much faster than typical overseas sourcing.

    Access to the Professional Buyer program is available upon registration, and many designers start by testing it on a single project.

    Would you be open to taking a quick look?

    Best,
   

