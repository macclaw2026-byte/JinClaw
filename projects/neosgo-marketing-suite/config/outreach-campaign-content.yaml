    - "Use YAML block style (|) for multi-paragraph content so line breaks are preserved."
    - "If contact_form_defaults.message or email_defaults.body_text is blank or left as placeholder text, use main_message_body."
    - "Use real sender identity only. Do not invent company or address details."
    - "optional_form_fields are fallback values for websites that require extra fields."
